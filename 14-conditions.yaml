- name: Gathering Facts
  hosts: local
  connection: local
  tasks:
  - name: print Facts
    ansible.builtin.debug:
      msg: "{{ ansible_facts }}"
  
  - name: check redhat or not
    ansible.builtin.debug:
      msg: "Yes, package manger is RedHat"
    when: ansible_facts.os_family == "RedHat"
  
  - name: Check Debain or not
    ansible.builtin.debug:
      msg: "Yes, package manger is Debain"
    when: ansible_facts.os_family == "Debain"
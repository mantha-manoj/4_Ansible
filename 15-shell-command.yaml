- name: ansible shell vs command module
  hosts: local
  connection: local
  tasks:
  - name: command module test
    # ansible.builtin.command: cat /etc/passwd | grep root
    ansible.builtin.shell: cat /etc/passwd | grep root
    register: user_output

  - name: print user_output
    ansible.builtin.debug:
      msg: "{{ user_output }}"
    
  - name: command module test
    ansible.builtin.command: echo "Hello World"
    register: text_output
  
  - name: print text_output
    ansible.builtin.debug:
      msg: "{{ text_output }}"